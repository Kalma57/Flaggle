spring.application.name=flagdemo

# DataSource - SQLite
spring.datasource.url=jdbc:sqlite:flaggle.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA / Hibernate: Use the standard dialect for SQLite supported by Hibernate
# If you have a custom SQLiteDialect class in your project, ensure its package matches this path
spring.jpa.database-platform=org.hibernate.dialect.SQLiteDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Thymeleaf settings
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Static resources settings
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false