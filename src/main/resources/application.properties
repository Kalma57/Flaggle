spring.application.name=flagdemo

# DataSource - SQLite: Use a simple relative path for cloud compatibility
spring.datasource.url=jdbc:sqlite:flaggle.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# JPA / Hibernate
# Note: Ensure the dialect class exists in your project package
spring.jpa.database-platform=com.example.flagdemo.SQLiteDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Thymeleaf settings
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Static resources settings
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false